<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div class="sidenav">
        <h1 class="dashboard clickable">Dashboard</h1>
        <ul class="sidenav-items">
            <div class="home">
                <img src="/icons/home.png" alt="">
                <p><a href=""><b>Home</b></a></p>
            </div>
            <div class="profile">
                <img src="/icons/card-account-details.png" alt="">
                <p><a href=""><b>Profile</b></a></p>
            </div>
            <div class="messages">
                <img src="/icons/message-reply.png" alt="">
                <p><a href=""><b>Messages</b></a></p>
            </div>
            <div class="history">
                <img src="/icons/clock-time-nine.png" alt="">
                <p><a href=""><b>History</b></a></p>
            </div>
            <div class="tasks">
                <img src="/icons/note-multiple.png" alt="">
                <p><a href=""><b>Tasks</b></a></p>
            </div>
            <div class="communities">
                <img src="/icons/account-group.png" alt="">
                <p><a href=""><b>Communities</b></a></p>
            </div>
            <div class="settings">
                <img src="/icons/cog.png" alt="">
                <p><a href=""><b>Settings</b></a></p>
            </div>
            <div class="support">
                <img src="/icons/face-agent.png" alt="">
                <p><a href=""><b>Support</b></a></p>
            </div>
            <div class="privacy">
                <img src="/icons/shield-check.png" alt="">
                <p><a href=""><b>Privacy</b></a></p>
            </div>
        </ul>
    </div>
    <div class="container">
        <header class="header">
            <div class="topnav">
                <img class="search-icon clickable" src="/icons/magnify.png" alt="">
                <input type="text">
                <img class="ring-icon clickable" src="/icons/bell-ring-outline.png" alt="">
                <img class="user-icon clickable" src="/icons/penguin.png" alt="">
                <p>Morgan Oakley</p>
            </div>
            <div class="topnav-bottom">
                <div class="user-div">
                    <img src="/icons/penguin.png" alt="">
                    <div class="greetings-div"> 
                        <p class="greeting">Hi there,</p>
                        <p><b>Morgan Oakley @morgan</b></p>
                    </div>
                </div>
                <div class="buttons-div">
                    <button class="clickable">New</button>
                    <button class="clickable">Upload</button>
                    <button class="clickable">Share</button>
                </div>        
            </div>
        </header>
        <div class="item-container">
            <div class="project-container">
                <div class="item1">
                    Item 1
                </div>
                <div class="item2">
                    Item 2
                </div>
                <div class="item3">
                    Item 3
                </div>
                <div class="item4">
                    Item 4
                </div>
                <div class="item5">
                    Item 5
                </div>
                <div class="item6">
                    Item 6
                </div>
            </div>
            <div class="announcements-trending-container">
                <div class="item7">
                    Item 7
                </div>
                <div class="item8">
                    Item 8
                </div>
            </div>
        </div>
    </div>
</body>
</html>
